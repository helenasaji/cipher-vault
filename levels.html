<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levels - Cipher Vault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h1>🗂 Mission Select</h1>
  <div class="progress-box">
    <p>Mission Progress</p>

    <div class="progress">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <p id="progressText">0% Complete</p>
  </div>

  <button onclick="location.href='level1.html'">
    Level 1 - Caesar Cipher
  </button>

  <button id="level2" disabled>
    🔒 Level 2 - Morse Code
  </button>

  <button disabled>
    🔒 Level 3 - Binary
  </button>
</div>

<script>
const level2 = document.getElementById("level2");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");

let progress = 0;

if (localStorage.getItem("level1Completed") === "true") {
    level2.disabled = false;
    level2.innerHTML = "Level 2 - Morse Code";
    level2.onclick = function () {
        location.href = "level2.html";
    };

    progress = 33;
}

progressFill.style.width = progress + "%";
progressText.innerHTML = progress + "% Complete";
}
</script>

</body>
</html>
